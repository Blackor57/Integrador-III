<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Gestión de Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <!-- NAVBAR (Corregido) -->
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-40"
    >
      <div class="flex items-center gap-2.5 cursor-pointer">
        <div class="text-[#cf6937] text-2xl">
          <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>
        <div class="leading-none">
          <div class="flex items-center gap-1.5">
            <span
              class="block font-serif font-black tracking-widest text-[#cf6937] text-base md:text-lg uppercase"
              >Estación</span
            >
            <span
              class="bg-[#cf6937] text-white font-mono text-[9px] font-bold px-1 py-0.5 rounded-sm"
              >ADMIN</span
            >
          </div>
          <span
            class="block text-[8px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-4 md:gap-6">
        <a
          href="Emp_Perfil.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-solid fa-users-gear text-xs"></i
          ><span class="hidden sm:inline">Perfil</span>
        </a>
        <a
          href="Caja_pedidos.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-[#cf6937]"
        >
          <i class="fa-regular fa-clipboard text-xs"></i
          ><span class="hidden sm:inline">Pedidos</span>
          <div
            class="active-indicator absolute bottom-[-14px] left-0 w-full h-[3px] bg-[#cf6937] rounded-full"
          ></div>
        </a>
        <a
          href="Caja_Mesas.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-solid fa-chair text-xs"></i
          ><span class="hidden sm:inline">Mesas</span>
        </a>
      </div>

      <div class="flex items-center gap-3 md:gap-4">
        <div class="text-right hidden sm:block leading-none">
          <span
            id="nombreAdmin"
            class="block text-xs font-bold text-stone-800 uppercase"
            >Cargando...</span
          >
          <span class="text-[9px] text-stone-500">Caja</span>
        </div>
        <button
          id="navBtnThemeToggle"
          class="w-9 h-9 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-amber-500 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
        >
          <i class="fa-solid fa-moon text-sm"></i>
        </button>
        <button
          id="navBtnLogout"
          class="w-9 h-9 rounded-full border border-stone-200 bg-white hover:bg-red-50 text-stone-500 hover:text-red-600 flex items-center justify-center transition-colors shadow-xs cursor-pointer"
        >
          <i class="fa-solid fa-power-off text-sm"></i>
        </button>
      </div>
    </nav>

    <!-- HEADER -->
    <header class="text-center py-8 px-4">
      <h1
        class="text-4xl font-serif font-bold tracking-widest text-[#f5be38] uppercase drop-shadow-md"
      >
        Gestión de Caja
      </h1>
      <p
        class="text-xs tracking-[0.3em] text-[#d4af77] uppercase mt-1 font-medium"
      >
        Administra los cobros y el estado de las órdenes
      </p>
    </header>

    <main
      class="max-w-7xl w-full mx-auto px-4 py-4 md:px-8 flex-grow space-y-6"
    >
      <div
        class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 border-b border-stone-800/60 pb-3"
      >
        <!-- PESTAÑAS (TABS) - AHORA SON 3 -->
        <div
          class="flex items-center gap-6 text-sm overflow-x-auto no-scrollbar w-full sm:w-auto"
        >
          <button
            id="tabActivos"
            class="tab-btn flex items-center gap-2 font-bold text-[#e07a48] border-b-2 border-[#e07a48] pb-3 -mb-[14px] cursor-pointer whitespace-nowrap"
          >
            <span
              class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"
            ></span>
            Pedidos Activos
          </button>

          <!-- NUEVA PESTAÑA: POR PAGAR -->
          <button
            id="tabPorPagar"
            class="tab-btn flex items-center gap-2 font-medium text-stone-500 hover:text-stone-300 pb-3 -mb-[14px] transition-colors cursor-pointer whitespace-nowrap"
          >
            <i class="fa-solid fa-file-invoice-dollar text-blue-400"></i>
            Por Pagar
          </button>

          <button
            id="tabHistorial"
            class="tab-btn flex items-center gap-2 font-medium text-stone-500 hover:text-stone-300 pb-3 -mb-[14px] transition-colors cursor-pointer whitespace-nowrap"
          >
            <i class="fa-regular fa-square-check text-green-500"></i>
            Historial
          </button>
          <a
            href="NuevaOrden.html"
            class="bg-[#e07a48] hover:bg-[#cf6937] text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-md transition-all inline-flex items-center justify-center gap-2 cursor-pointer self-start sm:self-auto shrink-0"
          >
            <i class="fa-solid fa-bag-shopping"></i> PARA LLEVAR
          </a>
        </div>
      </div>

      <!-- CONTENEDOR DE TARJETAS -->
      <div
        id="contenedorPedidos"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </main>
    <!-- MODAL DE PAGO -->
    <div
      id="modalPago"
      class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50"
    >
      <div
        class="bg-[#2a1a14] border border-stone-700 p-6 rounded-2xl w-full max-w-sm shadow-2xl"
      >
        <h3 class="text-white font-bold text-lg mb-4">
          Seleccionar Comprobante
        </h3>

        <select
          id="selectTipoRecibo"
          class="w-full bg-[#1c0e0a] text-white p-3 rounded-xl mb-4 border border-stone-600"
        >
          <option value="BOLETA">Boleta (DNI)</option>
          <option value="FACTURA">Factura (RUC)</option>
        </select>

        <!-- Campos Boleta -->
        <div id="camposBoleta" class="space-y-3">
          <input
            type="text"
            id="dniCliente"
            placeholder="DNI"
            class="w-full bg-[#1c0e0a] text-white p-3 rounded-lg border border-stone-600"
          />
          <input
            type="text"
            id="nombreCliente"
            placeholder="Nombre"
            class="w-full bg-[#1c0e0a] text-white p-3 rounded-lg border border-stone-600"
          />
        </div>

        <!-- Campos Factura (Ocultos por defecto) -->
        <div id="camposFactura" class="space-y-3 hidden">
          <input
            type="text"
            id="rucCliente"
            placeholder="RUC"
            class="w-full bg-[#1c0e0a] text-white p-3 rounded-lg border border-stone-600"
          />
          <input
            type="text"
            id="razonSocial"
            placeholder="Razón Social"
            class="w-full bg-[#1c0e0a] text-white p-3 rounded-lg border border-stone-600"
          />
          <input
            type="text"
            id="direccionCliente"
            placeholder="Dirección"
            class="w-full bg-[#1c0e0a] text-white p-3 rounded-lg border border-stone-600"
          />
        </div>

        <div class="flex gap-3 mt-6">
          <button
            id="btnCancelarModal"
            class="flex-1 bg-stone-700 text-white py-2 rounded-lg"
          >
            Cancelar
          </button>
          <button
            id="btnConfirmarPago"
            class="flex-1 bg-[#e07a48] text-white py-2 rounded-lg font-bold"
          >
            PAGAR AHORA
          </button>
        </div>
      </div>
    </div>

    <script src="/JS/Caja_pedidos.js"></script>
    <script src="/JS/Perfil_Admin.js"></script>
    <script src="/JS/LogOut.js"></script>
  </body>
</html>
