<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Nueva Orden</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(
          circle at top left,
          #1c0e0a 0%,
          #0c0402 100%
        );
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Animación suave para cuando se añade un producto al carrito */
      .cart-item-enter {
        animation: slideIn 0.2s ease-out forwards;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body
    class="h-screen overflow-hidden font-sans antialiased flex flex-col selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <!-- NAVBAR SIMPLIFICADO PARA EL POS -->
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 shrink-0 z-50"
    >
      <div
        class="flex items-center gap-3 cursor-pointer"
        onclick="window.location.href = 'Emp_mesas.html'"
      >
        <div
          class="text-[#cf6937] text-2xl hover:scale-110 transition-transform"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </div>
        <div class="leading-none ml-2">
          <span
            class="block font-serif font-black tracking-widest text-[#cf6937] text-lg uppercase"
            >Volver</span
          >
          <span
            class="block text-[10px] tracking-[0.2em] text-stone-500 uppercase font-medium"
            >A Mesas</span
          >
        </div>
      </div>

      <div
        class="flex items-center gap-4 bg-[#2a1a14]/5 text-stone-700 px-4 py-1.5 rounded-lg border border-stone-200"
      >
        <i class="fa-solid fa-chair text-[#cf6937]"></i>
        <span class="font-bold uppercase tracking-wider text-sm"
          >Creando orden para:
          <span id="displayMesaId" class="text-[#cf6937] text-lg"
            >...</span
          ></span
        >
      </div>
    </nav>

    <!-- MAIN POS LAYOUT -->
    <main class="flex-grow flex flex-col md:flex-row overflow-hidden">
      <!-- PANEL IZQUIERDO: PRODUCTOS -->
      <section
        class="w-full md:w-3/5 lg:w-2/3 flex flex-col bg-transparent border-r border-stone-800 p-4 md:p-6 overflow-hidden"
      >
        <div class="mb-4 flex justify-between items-end">
          <div>
            <h2
              class="text-xl font-serif font-bold tracking-wider text-white uppercase"
            >
              Menú Disponible
            </h2>
            <p class="text-xs text-stone-400 mt-1">
              Selecciona los productos para agregarlos a la comanda.
            </p>
          </div>
        </div>

        <!-- Grid de Productos (Scrollable) -->
        <div
          id="gridProductos"
          class="flex-grow overflow-y-auto no-scrollbar grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-20"
        >
          <!-- Productos inyectados por JS -->
        </div>
      </section>

      <!-- PANEL DERECHO: CARRITO / COMANDA -->
      <section
        class="w-full md:w-2/5 lg:w-1/3 flex flex-col bg-[#1c0e0a] border-l border-stone-800 shadow-2xl z-10 overflow-hidden"
      >
        <div class="p-5 border-b border-stone-800 bg-[#2a1a14]/40 shrink-0">
          <h3
            class="text-lg font-bold text-[#f5be38] uppercase tracking-wide flex items-center gap-2"
          >
            <i class="fa-solid fa-receipt"></i> Comanda Actual
          </h3>
        </div>

        <!-- Lista de items en el carrito (Scrollable) -->
        <div
          id="cartItemsContainer"
          class="flex-grow overflow-y-auto no-scrollbar p-5 space-y-3"
        >
          <div
            class="text-center text-stone-500 text-sm mt-10 italic"
            id="emptyCartMsg"
          >
            <i class="fa-solid fa-basket-shopping text-3xl mb-3 opacity-50"></i
            ><br />
            La comanda está vacía.
          </div>
          <!-- Items inyectados por JS -->
        </div>

        <!-- Footer del Carrito (Totales y Formulario Final) -->
        <div
          class="p-5 bg-[#2a1a14] border-t border-stone-800 shrink-0 space-y-4"
        >
          <div class="grid grid-cols-2 gap-3 mb-2">
            <div>
              <label
                class="block text-stone-400 font-semibold mb-1 uppercase tracking-wider text-[9px]"
                >Tipo Servicio</label
              >
              <select
                id="inputTipoServicio"
                class="w-full bg-[#1c0e0a] text-stone-200 border border-stone-700 rounded-lg p-2 outline-none focus:border-[#f5be38] text-xs"
              >
                <option value="MESA">SALÓN</option>
                <option value="RECOJO">PARA LLEVAR</option>
              </select>
            </div>
            <div>
              <label
                class="block text-stone-400 font-semibold mb-1 uppercase tracking-wider text-[9px]"
                >Notas Generales</label
              >
              <input
                type="text"
                id="inputNotas"
                placeholder="Ej: Sin cubiertos..."
                class="w-full bg-[#1c0e0a] text-stone-200 border border-stone-700 rounded-lg p-2 outline-none focus:border-[#f5be38] text-xs"
              />
            </div>
          </div>

          <div
            class="flex justify-between items-center text-sm font-medium text-stone-300"
          >
            <span>Subtotal</span>
            <span class="font-mono"
              >S/. <span id="lblSubtotal">0.00</span></span
            >
          </div>

          <div
            class="flex justify-between items-center text-xl font-bold text-[#f5be38] border-t border-stone-700/50 pt-3"
          >
            <span class="uppercase">Total</span>
            <span class="font-mono">S/. <span id="lblTotal">0.00</span></span>
          </div>

          <button
            id="btnEnviarPedido"
            class="w-full py-3.5 mt-2 rounded-xl bg-green-600 hover:bg-green-500 text-white font-bold uppercase tracking-wider transition-colors shadow-lg shadow-green-900/20 flex justify-center items-center gap-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <i class="fa-solid fa-paper-plane"></i> PROCESAR PEDIDO
          </button>
        </div>
      </section>
    </main>

    <script src="/JS/Orden_mozo.js"></script>
  </body>
</html>
