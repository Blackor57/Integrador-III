<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Gestión de Mesas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <!-- NAVBAR ADMIN -->
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-40"
    >
      <div class="flex items-center gap-2.5 cursor-pointer">
        <div class="text-[#cf6937] text-2xl">
          <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>
        <div class="leading-none">
          <div class="flex items-center gap-1.5">
            <span
              class="block font-serif font-black tracking-widest text-[#cf6937] text-base md:text-lg uppercase"
              >Estación</span
            >
            <span
              class="bg-[#cf6937] text-white font-mono text-[9px] font-bold px-1 py-0.5 rounded-sm"
              >ADMIN</span
            >
          </div>
          <span
            class="block text-[8px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-4 md:gap-6">
        <a
          href="Emp_Perfil.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-solid fa-users-gear text-xs"></i>
          <span class="hidden sm:inline">Perfil</span>
        </a>
        <a
          href="Caja_pedidos.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-regular fa-clipboard text-xs"></i>
          <span class="hidden sm:inline">Pedidos</span>
        </a>
        <a
          href="Caja_Mesas.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-[#cf6937]"
        >
          <i class="fa-solid fa-chair text-xs"></i>
          <span class="hidden sm:inline">Mesas</span>
          <div
            class="active-indicator absolute bottom-[-14px] left-0 w-full h-[3px] bg-[#cf6937] rounded-full"
          ></div>
        </a>
      </div>

      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block leading-none">
          <!-- Le agregamos el id="nombreAdmin" para inyectar el nombre con JS -->
          <span
            id="nombreAdmin"
            class="block text-xs font-bold text-stone-800 uppercase"
            >Cargando...</span
          >
          <span class="text-[9px] text-stone-500">Caja</span>
        </div>
        <button
          id="navBtnLogout"
          class="w-9 h-9 rounded-full border border-stone-200 bg-white hover:bg-red-50 text-stone-500 hover:text-red-600 flex items-center justify-center transition-colors shadow-xs cursor-pointer"
        >
          <i class="fa-solid fa-power-off text-sm"></i>
        </button>
      </div>
    </nav>

    <main
      class="max-w-7xl w-full mx-auto px-4 py-8 md:px-8 flex-grow space-y-6"
    >
      <div
        class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-stone-800 pb-3"
      >
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-table-cells-large text-[#f5be38] text-xl"></i>
          <h1
            class="text-xl font-serif font-bold tracking-wider text-white uppercase"
          >
            Salas y Mesas
          </h1>
        </div>

        <div
          class="flex items-center gap-4 text-xs font-medium bg-[#2a1a14]/60 px-4 py-2 rounded-xl border border-stone-800"
        >
          <span class="flex items-center gap-1.5 text-green-400">
            <span
              class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"
            ></span>
            Libres (<span id="countLibres">0</span>)
          </span>
          <span class="flex items-center gap-1.5 text-red-400">
            <span
              class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]"
            ></span>
            Ocupadas (<span id="countOcupadas">0</span>)
          </span>
        </div>
      </div>

      <!-- Contenedor dinámico de las tarjetas -->
      <div
        id="gridMesas"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
      >
        <!-- Las mesas se inyectan aquí con JS -->
      </div>
    </main>
    <!-- ========================================== -->
    <!-- MODAL 1: DETALLE DE MESA                   -->
    <!-- ========================================== -->
    <div id="detalleModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-[#3d2a21] border border-[#543d32] w-full max-w-sm rounded-[2rem] p-6 shadow-2xl space-y-4">
        <div class="flex justify-between items-center border-b border-stone-800 pb-2">
          <h3 id="modalTitle" class="font-serif font-bold text-[#f5be38] text-base uppercase tracking-wide">
            Detalle de Mesa
          </h3>
          <button onclick="document.getElementById('detalleModal').classList.add('hidden')" class="text-stone-400 hover:text-white cursor-pointer">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div id="modalContent" class="space-y-3 text-sm text-stone-300">
          <!-- Aquí inyectaremos los productos con JS -->
        </div>

        <div class="pt-4 border-t border-stone-800 flex justify-end">
          <button onclick="document.getElementById('detalleModal').classList.add('hidden')" class="px-5 py-2 rounded-xl bg-stone-700 hover:bg-stone-600 text-white text-xs font-bold cursor-pointer">
            CERRAR
          </button>
        </div>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- MODAL 2: TRANSFERENCIA DE MESA             -->
    <!-- ========================================== -->
    <div id="transferModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-[#3d2a21] border border-[#543d32] w-full max-w-sm rounded-[2rem] p-6 shadow-2xl space-y-4">
        <div class="flex justify-between items-center border-b border-stone-800 pb-2">
          <h3 class="font-serif font-bold text-amber-500 text-base uppercase tracking-wide">
            Transferir Mesa
          </h3>
          <button onclick="document.getElementById('transferModal').classList.add('hidden')" class="text-stone-400 hover:text-white cursor-pointer">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="space-y-3 text-sm text-stone-300">
          <p>Moviendo orden de la <span id="lblMesaOrigen" class="font-bold text-white">Mesa X</span> a:</p>
          <select id="selectMesaDestino" class="w-full bg-[#1c0e0a] text-white p-3 rounded-xl border border-stone-600 outline-none focus:border-amber-500">
            <!-- Las mesas LIBRES se inyectarán aquí con JS -->
            <option value="">Cargando mesas libres...</option>
          </select>
        </div>

        <div class="pt-4 border-t border-stone-800 flex gap-3">
          <button onclick="document.getElementById('transferModal').classList.add('hidden')" class="flex-1 px-5 py-2 rounded-xl bg-stone-700 hover:bg-stone-600 text-white text-xs font-bold cursor-pointer">
            CANCELAR
          </button>
          <button id="btnConfirmarTransferencia" class="flex-1 px-5 py-2 rounded-xl bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold cursor-pointer">
            CONFIRMAR
          </button>
        </div>
      </div>
    </div>
        </div>
      </div>
    </div>

    <script src="/JS/Caja_Mesas.js"></script>
    <script src="/JS/Perfil_Admin.js"></script>
    <script src="/JS/LogOut.js"></script>
  </body>
</html>
