<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Nuestra Carta</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
      /* Ocultar barra de scroll en los filtros horizontales para móviles */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-50"
    >
      <div class="flex items-center gap-3 cursor-pointer">
        <div class="text-[#bba3cc] text-2xl md:text-3xl">
          <i class="fa-solid fa-utensils"></i>
        </div>
        <div class="leading-none">
          <span
            class="block font-serif font-black tracking-widest text-[#cf6937] text-lg md:text-xl uppercase"
            >Estación</span
          >
          <span
            class="block text-[9px] md:text-[10px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-6 md:gap-8">
        <a
          href="Home.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-solid fa-utensils text-xs text-stone-400 group-hover:text-[#bba3cc] transition-colors"
          ></i>
          <span class="hidden sm:inline">Inicio</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full hidden"
          ></div>
        </a>
        <a
          href="pedido.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-regular fa-clipboard text-stone-400 group-hover:text-[#cf6937] transition-colors"
          ></i>
          <span class="hidden sm:inline">Mis Pedidos</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full hidden"
          ></div>
        </a>
        <a
          href="perfil.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-solid fa-user text-xs text-stone-400 group-hover:text-[#cf6937] transition-colors"
          ></i>
          <span class="hidden sm:inline">Mi Perfil</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full hidden"
          ></div>
        </a>
        <button
          id="navBtnLogout"
          class="py-2 text-sm font-medium text-stone-600 hover:text-red-600 transition-colors flex items-center gap-2 group cursor-pointer"
        >
          <i
            class="fa-solid fa-door-open text-xs text-stone-400 group-hover:text-red-500 transition-colors"
          ></i>
          <span class="hidden sm:inline">Salir</span>
        </button>
      </div>

      <div class="flex items-center gap-3 md:gap-4">
        <button
          id="btnOpenCarrito"
          class="relative w-10 h-10 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-stone-600 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
          aria-label="Ver carrito"
        >
          <i class="fa-solid fa-cart-shopping text-sm text-blue-900"></i>
          <span
            id="badgeCarritoTop"
            class="absolute -top-1.5 -right-1.5 bg-[#cf6937] text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#fdfbf7]"
          >
            0
          </span>
        </button>

        <button
          id="navBtnThemeToggle"
          class="w-10 h-10 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-amber-500 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
          aria-label="Cambiar tema"
        >
          <i class="fa-solid fa-moon text-sm"></i>
        </button>
      </div>
    </nav>

    <main
      class="max-w-7xl w-full mx-auto px-4 py-8 md:px-8 flex-grow space-y-8"
    >
      <div class="text-center">
        <h1
          class="text-4xl md:text-5xl font-serif font-bold tracking-widest text-[#f5be38] uppercase drop-shadow-md"
        >
          Nuestra Carta
        </h1>
        <p
          class="text-xs tracking-[0.3em] text-[#d4af77] uppercase mt-1 font-medium"
        >
          Autenticidad en cada sabor
        </p>
      </div>

      <div
        class="bg-[#3d2a21]/60 border border-[#543d32] rounded-2xl p-4 flex flex-col md:flex-row items-center justify-between gap-4 shadow-xl"
      >
        <div class="relative w-full md:max-w-md group">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400 group-focus-within:text-[#f5be38] transition-colors"
          >
            <i class="fa-solid fa-magnifying-glass text-sm"></i>
          </span>
          <input
            type="text"
            id="searchFood"
            placeholder="Buscar plato o bebida..."
            class="w-full bg-[#2a1a14]/90 text-stone-100 placeholder-stone-500 text-sm rounded-xl pl-10 pr-4 py-3 border border-stone-700/60 focus:border-[#f5be38] outline-none transition-all"
          />
        </div>

        <div class="flex items-center gap-6 w-full md:w-auto justify-end">
          <button
            id="btnOpenCarrito2"
            class="bg-[#e07a48] hover:bg-[#cf6937] text-white font-semibold text-xs px-4 py-3 rounded-xl ..."
          >
            <i class="fa-solid fa-basket-shopping"></i> Carrito
          </button>
        </div>
      </div>

      <div class="w-full border-b border-stone-800/60 pb-1">
        <div
          class="flex items-center gap-2 overflow-x-auto no-scrollbar whitespace-nowrap pb-3"
        >
          <button
            class="category-btn bg-[#e07a48] text-white text-xs font-semibold px-5 py-2.5 rounded-full shadow-md transition-all cursor-pointer"
          >
            Todos
          </button>
          <button
            class="category-btn bg-[#3d2a21]/40 text-stone-400 border border-stone-800 text-xs font-medium px-5 py-2.5 rounded-full hover:text-white hover:border-stone-600 transition-all cursor-pointer"
          >
            Platos a la carta
          </button>
          <button
            class="category-btn bg-[#3d2a21]/40 text-stone-400 border border-stone-800 text-xs font-medium px-5 py-2.5 rounded-full hover:text-white hover:border-stone-600 transition-all cursor-pointer"
          >
            Bebidas
          </button>
          <button
            class="category-btn bg-[#3d2a21]/40 text-stone-400 border border-stone-800 text-xs font-medium px-5 py-2.5 rounded-full hover:text-white hover:border-stone-600 transition-all cursor-pointer"
          >
            Pastas
          </button>
        </div>
      </div>

      <div
        id="contenedorPlatos"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pt-2"
      ></div>
    </main>
    <div
      id="modalCarrito"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm flex justify-end z-[60] hidden"
    >
      <!-- Panel Lateral (Se desliza desde la derecha) -->
      <div
        class="bg-[#1c0e0a] border-l border-stone-700 w-full max-w-md h-full shadow-2xl flex flex-col animate-in slide-in-from-right duration-300"
      >
        <!-- Header del Carrito -->
        <div
          class="p-5 border-b border-stone-800 flex justify-between items-center bg-[#2a1a14] shrink-0"
        >
          <h3
            class="font-serif font-bold text-[#f5be38] text-lg uppercase tracking-wide flex items-center gap-2"
          >
            <i class="fa-solid fa-basket-shopping"></i> Tu Pedido
          </h3>
          <button
            id="btnCloseCarrito"
            class="text-stone-400 hover:text-white transition-colors cursor-pointer text-xl"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- Lista de Productos en el Carrito (Scrollable) -->
        <div
          id="cartItemsContainer"
          class="p-5 overflow-y-auto no-scrollbar flex-grow space-y-3 bg-[#1c0e0a]"
        >
          <!-- El mensaje de carrito vacío o los items se inyectan aquí -->
          <div
            class="text-center text-stone-500 py-10 flex flex-col items-center"
          >
            <i
              class="fa-solid fa-cart-arrow-down text-4xl mb-3 text-stone-700"
            ></i>
            <p>Tu carrito está vacío.</p>
          </div>
        </div>

        <!-- Footer con Total y Botón de Procesar -->
        <div
          class="p-5 bg-[#2a1a14] border-t border-stone-800 shrink-0 space-y-4"
        >
          <!-- NUEVO: Selector de Recibo y Notas -->
          <div class="space-y-3 pb-3 border-b border-stone-700/50">
            <div class="flex items-center justify-between">
              <label
                class="text-[10px] text-stone-400 font-bold uppercase tracking-wider"
                >Comprobante (Tipo_Recibo)</label
              >
              <select
                id="cartTipoRecibo"
                class="bg-[#1c0e0a] text-stone-300 text-xs font-medium border border-stone-700 rounded-lg px-2 py-1.5 outline-none focus:border-[#f5be38] cursor-pointer"
              >
                <option value="BOLETA">Boleta</option>
                <option value="FACTURA">Factura</option>
              </select>
            </div>
            <div>
              <input
                type="text"
                id="cartNotas"
                placeholder="Notas para cocina (Ej: Sin ají, poco arroz...)"
                class="w-full bg-[#1c0e0a] text-stone-300 placeholder-stone-600 text-xs rounded-lg px-3 py-2 border border-stone-700 focus:border-[#f5be38] outline-none transition-colors"
              />
            </div>
          </div>

          <div
            class="flex justify-between items-center text-lg font-bold text-[#f5be38]"
          >
            <span class="uppercase text-sm text-stone-300">Total a Pagar</span>
            <span class="font-mono text-xl"
              >S/. <span id="lblTotalCarrito">0.00</span></span
            >
          </div>
          <button
            id="btnProcesarPedido"
            class="w-full bg-[#e07a48] hover:bg-[#cf6937] text-white font-bold tracking-widest text-xs px-4 py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
          >
            CONFIRMAR PEDIDO <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
    <div
      id="modalAgotado"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden"
    >
      <div
        class="bg-[#2a1a14] border border-red-500/50 w-full max-w-sm rounded-2xl shadow-2xl flex flex-col animate-in fade-in zoom-in duration-200"
      >
        <div class="p-5 flex flex-col items-center text-center">
          <div
            class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mb-4"
          >
            <i
              class="fa-solid fa-triangle-exclamation text-3xl text-red-500"
            ></i>
          </div>
          <h3
            class="font-serif font-bold text-white text-lg uppercase tracking-wide mb-2"
          >
            ¡Producto Agotado!
          </h3>
          <p
            id="msgAgotadoTexto"
            class="text-sm text-stone-400 leading-relaxed"
          >
            El producto se encuentra agotado por falta de insumos.
          </p>
        </div>
        <div class="p-4 bg-[#1c0e0a] border-t border-stone-800 rounded-b-2xl">
          <button
            onclick="
              document.getElementById('modalAgotado').classList.add('hidden')
            "
            class="w-full bg-stone-800 hover:bg-stone-700 text-white font-bold py-3 rounded-xl transition-colors text-sm uppercase tracking-wider shadow-md"
          >
            Entendido, modificaré la orden
          </button>
        </div>
      </div>
    </div>
    <script src="/JS/Carta.js"></script>
    <script src="/JS/LogOut.js"></script>
  </body>
</html>
