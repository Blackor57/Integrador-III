<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Gestión de Mesas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-50"
    >
      <div class="flex items-center gap-3 cursor-pointer">
        <div class="text-[#cf6937] text-2xl md:text-3xl">
          <i class="fa-solid fa-utensils"></i>
        </div>
        <div class="leading-none">
          <span
            class="block font-serif font-black tracking-widest text-[#cf6937] text-lg md:text-xl uppercase"
            >Estación</span
          >
          <span
            class="block text-[9px] md:text-[10px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-6 md:gap-8">
        <a
          href="Admin_inicio.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-solid fa-chart-line text-xs"></i>
          <span class="hidden sm:inline">Inicio</span>
        </a>
        <a
          href="Admin_pedidos.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-regular fa-clipboard text-xs"></i>
          <span class="hidden sm:inline">Pedidos</span>
        </a>
        <a
          href="Admin_mesas.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-[#cf6937]"
        >
          <i class="fa-solid fa-chair text-xs text-[#cf6937]"></i>
          <span class="hidden sm:inline">Mesas</span>
          <div
            class="absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full"
          ></div>
        </a>
      </div>

      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block leading-none">
          <span class="block text-xs font-bold text-stone-800">EDU</span>
          <span class="text-[10px] text-stone-500">Administrador</span>
        </div>
        <button
          id="navBtnLogout"
          class="w-9 h-9 rounded-full border border-stone-200 bg-white hover:bg-red-50 text-stone-500 hover:text-red-600 flex items-center justify-center transition-colors shadow-xs cursor-pointer"
        >
          <i class="fa-solid fa-power-off text-sm"></i>
        </button>
      </div>
    </nav>

    <main
      class="max-w-7xl w-full mx-auto px-4 py-8 md:px-8 flex-grow space-y-6"
    >
      <div
        class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-stone-800 pb-3"
      >
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-table-cells-large text-[#f5be38] text-xl"></i>
          <h1
            class="text-xl font-serif font-bold tracking-wider text-white uppercase"
          >
            Salas y Mesas
          </h1>
        </div>

        <div
          class="flex items-center gap-4 text-xs font-medium bg-[#2a1a14]/60 px-4 py-2 rounded-xl border border-stone-800"
        >
          <span class="flex items-center gap-1.5 text-green-400">
            <span
              class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"
            ></span>
            Libres (<span id="countLibres">0</span>)
          </span>
          <span class="flex items-center gap-1.5 text-red-400">
            <span
              class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]"
            ></span>
            Ocupadas (<span id="countOcupadas">0</span>)
          </span>
        </div>
      </div>

      <!-- Contenedor dinámico de las tarjetas -->
      <div
        id="gridMesas"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
      >
        <!-- Las mesas se inyectan aquí con JS -->
      </div>
    </main>

    <!-- MODAL AGREGAR MESA -->
    <div
      id="addModal"
      class="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden"
    >
      <div
        class="bg-[#3d2a21] border border-[#543d32] w-full max-w-sm rounded-[2rem] p-6 shadow-2xl space-y-4 animate-in fade-in zoom-in-95 duration-150"
      >
        <div
          class="flex justify-between items-center border-b border-stone-800 pb-2"
        >
          <h3
            class="font-serif font-bold text-[#f5be38] text-base uppercase tracking-wide"
          >
            Registrar Nueva Mesa
          </h3>
          <button
            type="button"
            class="close-modal-btn text-stone-400 hover:text-white text-base cursor-pointer"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form id="formAddMesa" class="space-y-4">
          <div>
            <label
              class="block text-stone-400 font-semibold mb-1 uppercase tracking-wider text-[10px]"
              >Número de Mesa</label
            >
            <input
              type="number"
              name="nombre"
              placeholder="Ej: 1"
              class="w-full bg-[#2a1a14] text-stone-200 border border-stone-700 rounded-xl p-3 outline-none focus:border-[#f5be38] text-center text-lg font-bold"
              required
              min="1"
            />
            <p class="text-[9px] text-stone-500 mt-1">
              * Se guardará automáticamente como estado "LIBRE".
            </p>
          </div>
          <div class="pt-3 border-t border-stone-800 flex justify-end gap-2">
            <button
              type="button"
              class="close-modal-btn px-4 py-2 rounded-xl border border-stone-700 text-stone-400 hover:text-stone-200 transition-colors text-xs font-bold cursor-pointer"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="px-5 py-2 rounded-xl bg-green-600 hover:bg-green-700 text-white text-xs font-bold shadow-md cursor-pointer"
            >
              GUARDAR MESA
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const API_BASE_URL = "http://localhost:8080/mesa";
        const gridMesas = document.getElementById("gridMesas");
        const addModal = document.getElementById("addModal");

        function getHeaders() {
          const headers = { "Content-Type": "application/json" };
          const token = localStorage.getItem("tu_token_jwt");
          if (token) headers["Authorization"] = `Bearer ${token}`;
          return headers;
        }

        // Manejo de modal
        document.querySelectorAll(".close-modal-btn").forEach((btn) => {
          btn.addEventListener("click", () => addModal.classList.add("hidden"));
        });

        // 1. OBTENER Y RENDERIZAR MESAS
        async function cargarMesas() {
          try {
            const response = await fetch(API_BASE_URL, {
              headers: getHeaders(),
            });
            if (!response.ok) throw new Error("Fallo al obtener las mesas");

            const mesas = await response.json();

            // Ordenamos las mesas por su número para que se vean en orden lógico
            mesas.sort((a, b) => a.nombre - b.nombre);
            renderizarMesas(mesas);
          } catch (error) {
            console.error("Error:", error);
            gridMesas.innerHTML = `<p class="text-red-400 col-span-full text-center py-8">Error al conectar con el servidor.</p>`;
          }
        }

        function renderizarMesas(mesas) {
          gridMesas.innerHTML = "";
          let libres = 0;
          let ocupadas = 0;

          mesas.forEach((mesa) => {
            const esLibre = mesa.estado === "LIBRE";

            if (esLibre) libres++;
            else ocupadas++;

            // Variables visuales dinámicas
            const colorEstado = esLibre ? "text-green-400" : "text-red-400";
            const bgEstado = esLibre
              ? "bg-green-500/10 border-green-500/20"
              : "bg-red-500/10 border-red-500/20";
            const iconoEstado = esLibre
              ? "fa-circle"
              : "fa-circle-dot animate-pulse";
            const textoBoton = esLibre ? "Agregar Pedido" : "Ver Detalles";
            const iconoBoton = esLibre ? "fa-plus" : "fa-eye";
            const borderHover = esLibre
              ? "hover:border-green-500/40"
              : "hover:border-red-500/40";

            const article = document.createElement("article");
            article.className = `bg-[#3d2a21]/60 border border-[#543d32] rounded-2xl p-4 flex flex-col justify-between space-y-4 shadow-lg transition-all relative ${borderHover}`;

            article.innerHTML = `
                        <div class="space-y-3">
                            <!-- Botón Eliminar en la esquina -->
                            <button class="absolute top-3 right-3 text-stone-500 hover:text-red-400 transition-colors btn-delete" data-id="${mesa.id}" title="Eliminar Mesa">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>

                            <div class="border-b border-stone-800 pb-2">
                                <h2 class="font-serif font-bold text-white text-base tracking-wide uppercase">Mesa ${mesa.nombre}</h2>
                                <span class="text-[9px] font-mono text-stone-500">ID_DB: ${mesa.id}</span>
                            </div>

                            <div class="flex justify-between items-center ${bgEstado} border p-2.5 rounded-lg text-xs">
                                <span class="${colorEstado} font-bold flex items-center gap-1.5 uppercase tracking-wide">
                                    <i class="fa-solid ${iconoEstado} text-[9px]"></i> ${mesa.estado}
                                </span>
                            </div>
                        </div>

                        <div class="pt-3 border-t border-stone-800/60">
                            <button class="w-full py-2 rounded-xl bg-[#2a1a14] hover:bg-[#cf6937] text-stone-300 hover:text-white border border-stone-700 hover:border-[#cf6937] font-bold text-[11px] uppercase tracking-wider transition-all flex items-center justify-center gap-2 cursor-pointer btn-accion" data-id="${mesa.id}">
                                <i class="fa-solid ${iconoBoton}"></i> ${textoBoton}
                            </button>
                        </div>
                    `;
            gridMesas.appendChild(article);
          });

          // Actualizamos los contadores del encabezado
          document.getElementById("countLibres").textContent = libres;
          document.getElementById("countOcupadas").textContent = ocupadas;

          // Añadimos siempre al final la tarjeta de "Añadir Nueva Mesa"
          agregarTarjetaNuevaMesa();
        }

        function agregarTarjetaNuevaMesa() {
          const btnAgregar = document.createElement("div");
          btnAgregar.className =
            "bg-[#3d2a21]/40 border-2 border-dashed border-[#543d32] rounded-2xl min-h-[180px] flex flex-col items-center justify-center p-6 text-center group hover:border-[#f5be38]/40 transition-colors cursor-pointer";
          btnAgregar.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-[#2a1a14]/80 text-stone-400 group-hover:text-[#f5be38] group-hover:bg-[#3d2a21] border border-stone-800 flex items-center justify-center text-lg transition-all shadow-md mb-3">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                    <p class="text-xs text-stone-400 font-bold uppercase tracking-wider">Registrar Mesa</p>
                `;

          btnAgregar.addEventListener("click", () => {
            document.getElementById("formAddMesa").reset();
            addModal.classList.remove("hidden");
          });

          gridMesas.appendChild(btnAgregar);
        }

        // 2. CREAR MESA (POST)
        document
          .getElementById("formAddMesa")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const numeroMesa = new FormData(e.target).get("nombre");

            const payload = {
              nombre: parseInt(numeroMesa),
              estado: "LIBRE",
            };

            try {
              const response = await fetch(API_BASE_URL, {
                method: "POST",
                headers: getHeaders(),
                body: JSON.stringify(payload),
              });

              if (!response.ok) throw new Error("Fallo al crear la mesa");

              await cargarMesas(); // Recargar grid
              addModal.classList.add("hidden");
            } catch (error) {
              alert("No se pudo crear la mesa. ¿Quizás ese número ya existe?");
              console.error(error);
            }
          });

        // 3. DELEGAR EVENTOS A LOS BOTONES GENERADOS
        gridMesas.addEventListener("click", async (e) => {
          // Evento: Botón Eliminar
          const btnDelete = e.target.closest(".btn-delete");
          if (btnDelete) {
            const idMesa = btnDelete.getAttribute("data-id");
            if (
              confirm(
                "¿Seguro que deseas eliminar esta mesa de la base de datos?",
              )
            ) {
              try {
                const res = await fetch(`${API_BASE_URL}/${idMesa}`, {
                  method: "DELETE",
                  headers: getHeaders(),
                });
                if (!res.ok) throw new Error("Error al eliminar");
                await cargarMesas();
              } catch (err) {
                alert(
                  "No se pudo eliminar. Verifica que no tenga pedidos amarrados en el historial.",
                );
              }
            }
            return;
          }

          // Evento: Botón Acción (Agregar Pedido / Ver Detalles)
          const btnAccion = e.target.closest(".btn-accion");
          if (btnAccion) {
            const idMesa = btnAccion.getAttribute("data-id");
            const texto = btnAccion.textContent.trim();

            if (texto.includes("Agregar Pedido")) {
              // Lógica para enviar a crear un pedido
              alert(
                "Llevando a pantalla de crear orden para Mesa ID: " + idMesa,
              );
              window.location.href = `NuevaOrden.html?mesa=${idMesa}`;
            } else {
              // Lógica para ver el pedido actual
              alert("Mostrando el pedido en curso de la Mesa ID: " + idMesa);
              // window.location.href = `Admin_pedidos.html?filtroMesa=${idMesa}`;
            }
          }
        });

        // LOGOUT
        document
          .getElementById("navBtnLogout")
          ?.addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "Index.html";
          });

        // ARRANQUE
        cargarMesas();
      })();
    </script>
    
  </body>
</html>
