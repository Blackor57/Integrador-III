<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Barra & Bebidas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between text-stone-200"
  >
    <!-- NAVBAR -->
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-50 sticky top-0"
    >
      <div class="flex items-center gap-3">
        <div class="text-[#cf6937] text-2xl">
          <i class="fa-solid fa-martini-glass-citrus"></i>
        </div>
        <div class="leading-none">
          <span
            class="block font-serif font-black tracking-widest text-[#cf6937] text-lg md:text-xl uppercase"
            >Estación</span
          >
          <span
            class="block text-[8px] tracking-[0.3em] text-stone-500 uppercase font-medium"
            >Barra</span
          >
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs text-stone-500 font-mono">Pedidos en Barra:</span>
        <span
          id="globalQueueCount"
          class="bg-blue-600 text-white font-mono font-bold text-xs px-2.5 py-1 rounded-full"
          >0</span
        >
      </div>
    </nav>

    <main
      class="w-full mx-auto px-4 md:px-12 py-6 flex-grow grid grid-cols-1 lg:grid-cols-2 gap-8 h-[calc(100vh-140px)]"
    >
      <!-- COLUMNA 1: PREPARACIÓN -->
      <section
        class="flex flex-col bg-[#140a07]/90 border border-stone-800/80 rounded-[1.8rem] p-4 h-full overflow-hidden"
      >
        <div class="border-b border-stone-800 pb-3 mb-4">
          <span class="font-serif font-bold text-sm uppercase text-stone-200"
            ><i class="fa-solid fa-shaker text-blue-400"></i> En
            Preparación</span
          >
        </div>
        <div
          class="flex-grow overflow-y-auto space-y-4 pr-1 no-scrollbar"
          id="columnEnEspera"
        >
          <div
            id="esperaEmptyState"
            class="h-full flex flex-col items-center justify-center text-center p-4 text-stone-600"
          >
            <i class="fa-solid fa-glass-water text-2xl opacity-30 mb-2"></i>
            <p class="text-[11px]">No hay items en preparación.</p>
          </div>
        </div>
      </section>

      <!-- COLUMNA 2: LISTO -->
      <section
        class="flex flex-col bg-[#140a07]/90 border border-stone-800/80 rounded-[1.8rem] p-4 h-full overflow-hidden"
      >
        <div class="flex justify-between border-b border-stone-800 pb-3 mb-4">
          <span class="font-serif font-bold text-sm uppercase text-stone-200"
            ><i class="fa-solid fa-check-double text-emerald-400"></i> Listo /
            Despacho</span
          >
          <span
            id="readyCountBadge"
            class="bg-stone-800 text-stone-400 font-mono text-[10px] px-2 py-0.5 rounded-full font-bold"
            >0</span
          >
        </div>
        <div
          class="flex-grow overflow-y-auto space-y-4 pr-1 no-scrollbar"
          id="columnListo"
        ></div>
        <div
          class="flex-grow overflow-y-auto space-y-4 pr-1 no-scrollbar"
          id="columnListo"
        >
          <div
            id="readyEmptyState"
            class="h-full flex flex-col items-center justify-center text-center p-4 text-stone-600"
          >
            <i class="fa-solid fa-check-double text-2xl opacity-30 mb-2"></i>
            <p class="text-[11px]">No hay items listos.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="/JS/Barra.js"></script>
</html>
