<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Mis Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-40"
    >
      <div class="flex items-center gap-3 cursor-pointer">
        <div class="text-[#bba3cc] text-2xl md:text-3xl">
          <i class="fa-solid fa-utensils"></i>
        </div>
        <div class="leading-none">
          <span
            class="block font-serif font-black tracking-widest text-[#cf6937] text-lg md:text-xl uppercase"
            >Estación</span
          >
          <span
            class="block text-[9px] md:text-[10px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-6 md:gap-8">
        <a
          href="Home.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-solid fa-utensils text-xs text-stone-400 group-hover:text-[#bba3cc] transition-colors"
          ></i>
          <span class="hidden sm:inline">Inicio</span>
        </a>
        <a
          href="pedido.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-[#cf6937]"
        >
          <i class="fa-regular fa-clipboard text-xs text-[#cf6937]"></i>
          <span class="hidden sm:inline">Mis Pedidos</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full"
          ></div>
        </a>
        <a
          href="perfil.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-solid fa-user text-xs text-stone-400 group-hover:text-[#cf6937] transition-colors"
          ></i>
          <span class="hidden sm:inline">Mi Perfil</span>
        </a>
        <button
          id="navBtnLogout"
          class="py-2 text-sm font-medium text-stone-600 hover:text-red-600 transition-colors flex items-center gap-2 group cursor-pointer"
        >
          <i
            class="fa-solid fa-door-open text-xs text-stone-400 group-hover:text-red-500 transition-colors"
          ></i>
          <span class="hidden sm:inline">Salir</span>
        </button>
      </div>

      <div class="flex items-center gap-3 md:gap-4">
        <button
          class="relative w-10 h-10 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-stone-600 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
          aria-label="Ver carrito"
        >
          <i class="fa-solid fa-cart-shopping text-sm text-blue-900"></i>
          <span
            class="absolute -top-1.5 -right-1.5 bg-[#cf6937] text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#fdfbf7]"
            >0</span
          >
        </button>
        <button
          id="navBtnThemeToggle"
          class="w-10 h-10 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-amber-500 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
        >
          <i class="fa-solid fa-moon text-sm"></i>
        </button>
      </div>
    </nav>

    <header class="text-center py-8 px-4">
      <h1
        class="text-4xl font-serif font-bold tracking-widest text-[#f5be38] uppercase drop-shadow-md"
      >
        Mis Pedidos
      </h1>
      <p
        class="text-xs tracking-[0.3em] text-[#d4af77] uppercase mt-1 font-medium"
      >
        Sigue y gestiona las órdenes en tiempo real
      </p>
    </header>

    <main
      class="max-w-7xl w-full mx-auto px-4 py-4 md:px-8 flex-grow space-y-6"
    >
      <div
        class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 border-b border-stone-800/60 pb-3"
      >
        <div class="flex items-center gap-6 text-sm">
          <button
            class="flex items-center gap-2 font-bold text-[#e07a48] border-b-2 border-[#e07a48] pb-3 -mb-[14px] cursor-pointer"
          >
            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            Pedidos Activos
          </button>
          <button
            class="flex items-center gap-2 font-medium text-stone-500 hover:text-stone-300 pb-3 -mb-[14px] transition-colors cursor-pointer"
          >
            <i class="fa-regular fa-square-check text-green-500"></i>
            Historial
          </button>
        </div>

        <button
          id="btnOpenModal"
          class="bg-[#e07a48] hover:bg-[#cf6937] text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 cursor-pointer self-start sm:self-auto"
        >
          <i class="fa-solid fa-plus"></i> NUEVO PEDIDO
        </button>
      </div>

      <div
        id="contenedorPedidos"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </main>

    <div
      id="modalContainer"
      class="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden"
    >
      <div
        class="bg-[#3d2a21] border border-[#543d32] w-full max-w-md rounded-[2rem] p-6 shadow-2xl space-y-5 animate-in fade-in zoom-in duration-200"
      >
        <div
          class="flex justify-between items-center border-b border-stone-800 pb-3"
        >
          <h3
            class="font-serif font-bold text-[#f5be38] text-lg uppercase tracking-wide"
          >
            Nuevo Pedido
          </h3>
          <button
            id="btnCloseModal"
            class="text-stone-400 hover:text-white transition-colors cursor-pointer text-lg"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form id="apiOrderForm" class="space-y-4 text-xs">
          <div>
            <label
              class="block text-stone-400 font-semibold mb-1.5 uppercase tracking-wider text-[10px]"
              >Mesa de Servicio (Id_mesa)</label
            >
            <select
              name="id_mesa"
              class="w-full bg-[#2a1a14] text-stone-200 border border-stone-700 rounded-xl p-3 outline-none focus:border-[#f5be38]"
              required
            >
              <option value="1">Mesa 01 - Sala Principal</option>
              <option value="2">Mesa 02 - Terraza</option>
              <option value="3">Mesa 03 - Comedor VIP</option>
            </select>
          </div>

          <div>
            <label
              class="block text-stone-400 font-semibold mb-1.5 uppercase tracking-wider text-[10px]"
              >Tipo de Comprobante (Tipo_servicio)</label
            >
            <div class="grid grid-cols-2 gap-3">
              <label
                class="border border-stone-700 bg-[#2a1a14]/60 p-3 rounded-xl flex items-center gap-2 cursor-pointer text-stone-300"
              >
                <input
                  type="radio"
                  name="tipo_servicio"
                  value="BOLETA"
                  class="accent-[#e07a48]"
                  checked
                />
                Boleta
              </label>
              <label
                class="border border-stone-700 bg-[#2a1a14]/60 p-3 rounded-xl flex items-center gap-2 cursor-pointer text-stone-300"
              >
                <input
                  type="radio"
                  name="tipo_servicio"
                  value="FACTURA"
                  class="accent-[#e07a48]"
                />
                Factura
              </label>
            </div>
          </div>

          <div>
            <label
              class="block text-stone-400 font-semibold mb-1.5 uppercase tracking-wider text-[10px]"
              >Notas Especiales de Cocina</label
            >
            <textarea
              name="notas_especiales"
              rows="2"
              placeholder="Ej: Sin sal, salsas aparte, término medio..."
              class="w-full bg-[#2a1a14] text-stone-200 border border-stone-700 rounded-xl p-3 outline-none focus:border-[#f5be38] resize-none"
            ></textarea>
          </div>

          <div class="pt-3 border-t border-stone-800 flex justify-end gap-2">
            <button
              type="button"
              id="btnCancelModal"
              class="px-4 py-2.5 rounded-xl border border-stone-700 text-stone-400 hover:text-stone-200 transition-colors cursor-pointer"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="px-5 py-2.5 rounded-xl bg-[#e07a48] hover:bg-[#cf6937] text-white font-bold transition-colors cursor-pointer shadow-md"
            >
              CREAR PEDIDO
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="modalDetalles"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden"
    >
      <div
        class="bg-[#1c0e0a] border border-stone-700 w-full max-w-md rounded-2xl shadow-2xl flex flex-col max-h-[85vh] animate-in fade-in zoom-in duration-200"
      >
        <!-- Header -->
        <div
          class="p-5 border-b border-stone-800 flex justify-between items-center bg-[#2a1a14] rounded-t-2xl shrink-0"
        >
          <h3
            class="font-serif font-bold text-[#f5be38] text-lg uppercase tracking-wide"
          >
            Pedido #<span id="detPedidoId"></span>
          </h3>
          <button
            id="btnCloseDetalles"
            class="text-stone-400 hover:text-white transition-colors cursor-pointer text-lg"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- Lista de Items (Scrollable) -->
        <div class="p-5 overflow-y-auto no-scrollbar flex-grow bg-[#1c0e0a]">
          <h4
            class="text-[10px] text-stone-500 font-bold uppercase tracking-widest mb-3"
          >
            Productos Solicitados
          </h4>
          <div id="listaDetalles" class="space-y-3">
            <!-- Los detalles se inyectan aquí con JS -->
          </div>
        </div>

        <!-- Footer con Total -->
        <div
          class="p-5 bg-[#2a1a14] border-t border-stone-800 rounded-b-2xl shrink-0"
        >
          <div
            class="flex justify-between items-center text-lg font-bold text-[#f5be38]"
          >
            <span class="uppercase text-sm text-stone-300">Total a Pagar</span>
            <span class="font-mono text-xl"
              >S/. <span id="detPedidoTotal">0.00</span></span
            >
          </div>
        </div>
      </div>
    </div>

    <script src="/JS/Pedido.js"></script>
    <script src="/JS/LogOut.js"></script>
  </body>
</html>
