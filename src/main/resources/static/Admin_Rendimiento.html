<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Estación - Admin Productos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200">


    <!-- =========================================================================
         NAVBAR ADMIN
         ========================================================================= -->
    <nav
        class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-40">
        <div class="flex items-center gap-2.5 cursor-pointer">
            <div class="text-[#cf6937] text-2xl">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <div class="leading-none">
                <div class="flex items-center gap-1.5">
                    <span
                        class="block font-serif font-black tracking-widest text-[#cf6937] text-base md:text-lg uppercase">Estación</span>
                    <span
                        class="bg-[#cf6937] text-white font-mono text-[9px] font-bold px-1 py-0.5 rounded-sm">ADMIN</span>
                </div>
                <span class="block text-[8px] tracking-[0.4em] text-stone-500 uppercase font-medium">Huaral</span>
            </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-4 md:gap-6">
            <a href="Admin_inicio.html"
                class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center group text-stone-600 hover:text-[#cf6937]">
                <i class="fa-solid fa-users-gear text-xs"></i>
                <span class="hidden sm:inline">Inicio</span>
            </a>
            <a href="Admin_Usuario.html"
                class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]">
                <i class="fa-solid fa-users-gear text-xs"></i>
                <span class="hidden sm:inline">Usuario</span>
            </a>
            <a href="Admin_pedidos.html"
                class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]">
                <i class="fa-regular fa-clipboard text-xs"></i>
                <span class="hidden sm:inline">Pedidos</span>
            </a>
            <a href="Admin_productos.html"
                class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]">
                <i class="fa-regular fa-clipboard text-xs"></i>
                <span class="hidden sm:inline">Productos</span>
            </a>
            <a href="Admin_mesas.html"
                class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]">
                <i class="fa-regular fa-clipboard text-xs"></i>
                <span class="hidden sm:inline">Mesas</span>
            </a>
            <a href="Admin_Rendimiento.html"
                class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-[#cf6937]">
                <i class="fa-regular fa-clipboard text-xs"></i>
                <span class="hidden sm:inline">Rendimiento</span>
                <div class="active-indicator absolute bottom-[-14px] left-0 w-full h-[3px] bg-[#cf6937] rounded-full">
                </div>
            </a>
            <a
          href="Admin_Insumo.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-[#cf6937]"
        >
          <i class="fa-solid fa-boxes-stacked text-xs"></i
          ><span class="hidden sm:inline">Insumos y Lotes</span>
          </a>
        </div>

        <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block leading-none">
          <span
            id="nombreAdmin"
            class="block text-xs font-bold text-stone-800 uppercase"
            >Cargando...</span
          >
          <span class="text-[9px] text-stone-500">Administrador</span>
        </div>
    </nav>

    <main class="w-full mx-auto px-4 md:px-12 py-8 flex-grow space-y-6">

    </main>

    <footer class="w-full text-center py-4 text-[11px] text-stone-600 border-t border-stone-900 bg-[#0c0402]/80">
        &copy; 2026 Restaurante La Estación - Panel de Control de Menú.
    </footer>
    <script src="/JS/Perfil_Admin.js"></script>
</body>

</html>
