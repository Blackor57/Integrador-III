<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Mi Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-40"
    >
      <div class="flex items-center gap-2.5 cursor-pointer">
        <div class="text-[#cf6937] text-2xl">
          <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>
        <div class="leading-none">
          <div class="flex items-center gap-1.5">
            <span
              class="block font-serif font-black tracking-widest text-[#cf6937] text-base md:text-lg uppercase"
              >Estación</span
            >
            <span
              class="bg-[#cf6937] text-white font-mono text-[9px] font-bold px-1 py-0.5 rounded-sm"
              >ADMIN</span
            >
          </div>
          <span
            class="block text-[8px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-4 md:gap-6">
        <a
          href="Emp_Perfil.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-solid fa-users-gear text-xs"></i>
          <span class="hidden sm:inline">Perfil</span>
        </a>
        <a
          id="navLinkPedidos"
          href="Emp_pedidos.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-bold transition-colors flex items-center gap-1.5 group text-stone-600 hover:text-[#cf6937]"
        >
          <i class="fa-regular fa-clipboard text-xs"></i>
          <span class="hidden sm:inline">Pedidos</span>
        </a>

        <!-- Enlace de Mesas con ID agregado -->
        <a
          id="navLinkMesas"
          href="Emp_Mesas.html"
          class="admin-nav-btn relative py-2 px-2.5 text-xs sm:text-sm font-medium transition-colors flex items-center gap-1.5 group text-[#cf6937]"
        >
          <i class="fa-solid fa-chair text-xs"></i>
          <span class="hidden sm:inline">Mesas</span>
        </a>
      </div>

      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block leading-none">
          <!-- Le agregamos el id="nombreAdmin" para inyectar el nombre con JS -->
          <span
            id="nombreAdmin"
            class="block text-xs font-bold text-stone-800 uppercase"
            >Cargando...</span
          >
          <span class="text-[9px] text-stone-500">Mozo</span>
        </div>
        <button
          id="navBtnLogout"
          class="w-9 h-9 rounded-full border border-stone-200 bg-white hover:bg-red-50 text-stone-500 hover:text-red-600 flex items-center justify-center transition-colors shadow-xs cursor-pointer"
        >
          <i class="fa-solid fa-power-off text-sm"></i>
        </button>
      </div>
    </nav>

    <main
      class="max-w-5xl w-full mx-auto px-4 py-8 md:px-8 flex-grow space-y-6"
    >
      <section
        class="bg-[#3d2a21]/60 border border-[#543d32] rounded-[2rem] p-6 flex flex-col sm:flex-row items-center justify-between gap-6 shadow-xl"
      >
        <div
          class="flex flex-col sm:flex-row items-center gap-5 text-center sm:text-left"
        >
          <div
            class="w-20 h-20 rounded-full bg-[#4a352b] border-2 border-[#f5be38] flex items-center justify-center text-4xl shadow-inner select-none"
          >
            👨‍🍳
          </div>
          <div class="space-y-1.5">
            <div
              class="flex items-center justify-center sm:justify-start gap-3"
            >
              <h2
                id="cardNombre"
                class="text-2xl font-serif font-bold tracking-wide text-white uppercase"
              >
                Cargando...
              </h2>
              <span
                id="cardRol"
                class="bg-green-500/20 text-green-400 border border-green-500/30 text-[10px] uppercase font-bold tracking-wider px-2.5 py-0.5 rounded-md"
              >
                Cargando...
              </span>
            </div>
            <p id="cardEmail" class="text-xs text-stone-400 font-mono"></p>
          </div>
        </div>

        <button
          onclick="window.location.href = 'Editar_Perfil.html'"
          class="w-full sm:w-auto bg-[#e07a48] hover:bg-[#cf6937] text-white font-medium text-xs tracking-wide px-5 py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 cursor-pointer active:scale-95"
        >
          <i class="fa-regular fa-pen-to-square"></i> EDITAR PERFIL
        </button>
      </section>

      <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
        <section
          class="bg-[#3d2a21]/60 border border-[#543d32] rounded-[2rem] p-6 shadow-xl md:col-span-2 space-y-5"
        >
          <div
            class="flex items-center gap-2 border-b border-[#f5be38]/20 pb-2 mb-2"
          >
            <i class="fa-solid fa-address-card text-[#f5be38] text-sm"></i>
            <h3 class="text-white text-xs font-bold tracking-wider uppercase">
              Información Personal
            </h3>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Nombre Completo</span
            >
            <p id="infoNombre" class="text-sm font-medium text-stone-200">
              Cargando...
            </p>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Correo Electrónico</span
            >
            <p
              id="infoEmail"
              class="text-sm font-medium text-[#f5be38] font-mono break-all hover:underline cursor-pointer"
            >
              Cargando...
            </p>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Teléfono</span
            >
            <p
              id="infoTelefono"
              class="text-sm font-medium text-stone-200 font-mono"
            >
              Cargando...
            </p>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Dirección</span
            >
            <p id="infoDireccion" class="text-sm font-medium text-stone-200">
              Cargando...
            </p>
          </div>
        </section>

        <section
          class="bg-[#3d2a21]/60 border border-[#543d32] rounded-[2rem] p-6 shadow-xl md:col-span-3 space-y-5"
        >
          <div
            class="flex items-center gap-2 border-b border-[#f5be38]/20 pb-2 mb-2"
          >
            <i class="fa-solid fa-chart-simple text-[#f5be38] text-sm"></i>
            <h3 class="text-white text-xs font-bold tracking-wider uppercase">
              Estadísticas
            </h3>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div
              class="bg-[#2a1a14]/60 border border-stone-800/80 rounded-2xl p-4 text-center flex flex-col justify-center items-center h-28"
            >
              <span
                id="statPedidos"
                class="block text-3xl font-mono font-black text-[#f5be38]"
              >
                0
              </span>
              <span
                class="block text-[10px] font-semibold text-stone-400 uppercase tracking-wider mt-1"
                >Pedidos</span
              >
            </div>

            <div
              class="bg-[#2a1a14]/60 border border-stone-800/80 rounded-2xl p-4 text-center flex flex-col justify-center items-center h-28 relative overflow-hidden"
            >
              <span
                class="absolute top-2.5 right-2.5 w-2 h-2 rounded-full bg-red-500 animate-pulse"
              ></span>
              <span
                id="statPedidosActivos"
                class="block text-3xl font-mono font-black text-white"
                >0</span
              >
              <span
                class="block text-[10px] font-semibold text-stone-400 uppercase tracking-wider mt-1"
                >Pedidos Activos</span
              >
            </div>

            <div
              class="bg-[#2a1a14]/60 border border-stone-800/80 rounded-2xl p-4 text-center flex flex-col justify-center items-center h-28"
            >
              <span
                id="statCalificacion"
                class="block text-3xl font-mono font-black text-green-400 flex items-center justify-center gap-1"
              >
                0.0 <span class="text-xs text-[#f5be38]">★</span>
              </span>
              <span
                class="block text-[10px] font-semibold text-stone-400 uppercase tracking-wider mt-1"
                >Calificación</span
              >
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="/JS/Perfil_Admin.js"></script>
    <script src="/JS/Perfil.js"></script>
  </body>
</html>
