<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA ESTACIÓN Huaral - Iniciar Sesión</title>
    
    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/Login.css">
</head>
<body class="login-page">
    
    <div class="login-background" id="parallaxBg">
        <div class="login-overlay"></div>
    </div>
    
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <!-- Decoración superior -->
            <div class="login-decoration">0</div>
            
            <!-- Header del card -->
            <div class="login-header">
                <h1 class="login-title">LA ESTACIÓN</h1>
                <span class="login-subtitle-brand">Huaral</span>
                <p class="login-description">Bienvenido de nuevo! Por favor, inicie sesión para continuar</p>
            </div>
            
            <!-- Formulario -->
            <form class="login-form" id="loginForm" novalidate>
                <!-- Campo Email -->
                <div class="form-group floating-label">
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="Introduce tu correo electrónico" 
                        required
                        autocomplete="email"
                    >
                    <label for="email" class="form-label">
                        <span class="label-icon">📧</span> Correo Electrónico
                    </label>
                    <div class="input-icon-right">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <span class="validation-message" id="emailValidation"></span>
                </div>
                
                <!-- Campo Contraseña -->
                <div class="form-group floating-label">
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Introduce tu contraseña" 
                        required
                        minlength="6"
                        autocomplete="current-password"
                    >
                    <label for="password" class="form-label">
                        <span class="label-icon">🔒</span> Contraseña
                    </label>
                    <button 
                        type="button" 
                        class="password-toggle" 
                        id="togglePassword"
                        aria-label="Mostrar contraseña"
                    >
                        <svg class="eye-icon eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-icon eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                    <a href="#" class="forgot-password" id="forgotPassword">¿Olvidaste tu contraseña?</a>
                </div>
                
                <!-- Validación de contraseña -->
                <div class="password-validation" id="passwordValidation" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="3">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Contraseña válida.</span>
                </div>
                
                <!-- Recordarme -->
                <div class="form-group checkbox-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">Recordarme</span>
                    </label>
                </div>
                
                <!-- Botón Iniciar Sesión -->
                <button type="submit" class="btn btn-primary btn-full" id="loginButton">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="btn-loader" style="display:none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                    </span>
                </button>
                
                <!-- Divisor -->
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">O continuar como</span>
                    <span class="divider-line"></span>
                </div>
                
                <!-- Botón Invitado -->
                <button type="button" class="btn btn-secondary btn-full" id="guestButton">
                    Continuar como Invitado
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
                
                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="social-btn" aria-label="Iniciar con Google">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>G</span>
                    </button>
                    <button type="button" class="social-btn" aria-label="Iniciar con Facebook">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        <span>f</span>
                    </button>
                </div>
                
                <!-- Link Registro -->
                <p class="register-link">
                    ¿No tienes una cuenta? <a href="/registro">Regístrate <span class="arrow">→</span></a>
                </p>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="/static/js/global.js"></script>
    <script src="/static/js/Login.js"></script>
</body>
</html>
