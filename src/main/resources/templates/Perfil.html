<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Estación - Mi Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: radial-gradient(circle at center, #1c0e0a 0%, #0c0402 100%);
      }
    </style>
  </head>
  <body
    class="min-h-screen font-sans antialiased flex flex-col justify-between selection:bg-amber-500 selection:text-white text-stone-200"
  >
    <nav
      class="w-full bg-[#fdfbf7] border-b border-stone-200 shadow-sm px-4 md:px-8 py-3 flex items-center justify-between text-stone-800 z-50"
    >
      <div class="flex items-center gap-3 cursor-pointer">
        <div class="text-[#bba3cc] text-2xl md:text-3xl">
          <i class="fa-solid fa-utensils"></i>
        </div>
        <div class="leading-none">
          <span
            class="block font-serif font-black tracking-widest text-[#cf6937] text-lg md:text-xl uppercase"
            >Estación</span
          >
          <span
            class="block text-[9px] md:text-[10px] tracking-[0.4em] text-stone-500 uppercase font-medium"
            >Huaral</span
          >
        </div>
      </div>

      <div class="flex items-center gap-6 md:gap-8">
        <a
          href="index.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-solid fa-utensils text-xs text-stone-400 group-hover:text-[#bba3cc] transition-colors"
          ></i>
          <span class="hidden sm:inline">Inicio</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full hidden"
          ></div>
        </a>
        <a
          href="Pedido.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-regular fa-clipboard text-stone-400 group-hover:text-[#cf6937] transition-colors"
          ></i>
          <span class="hidden sm:inline">Mis Pedidos</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full hidden"
          ></div>
        </a>
        <a
          href="perfil.html"
          class="nav-link relative py-2 text-sm font-medium transition-colors flex items-center gap-2 group text-stone-600 hover:text-[#cf6937]"
        >
          <i
            class="fa-solid fa-user text-xs text-stone-400 group-hover:text-[#cf6937] transition-colors"
          ></i>
          <span class="hidden sm:inline">Mi Perfil</span>
          <div
            class="active-indicator absolute bottom-0 left-0 w-full h-[3px] bg-[#cf6937] rounded-full hidden"
          ></div>
        </a>
        <button
          id="navBtnLogout"
          class="py-2 text-sm font-medium text-stone-600 hover:text-red-600 transition-colors flex items-center gap-2 group cursor-pointer"
        >
          <i
            class="fa-solid fa-door-open text-xs text-stone-400 group-hover:text-red-500 transition-colors"
          ></i>
          <span class="hidden sm:inline">Salir</span>
        </button>
      </div>

      <div class="flex items-center gap-3 md:gap-4">
        <button
          class="relative w-10 h-10 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-stone-600 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
          aria-label="Ver carrito"
        >
          <i class="fa-solid fa-cart-shopping text-sm text-blue-900"></i>
          <span
            class="absolute -top-1.5 -right-1.5 bg-[#cf6937] text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-[#fdfbf7]"
            >0</span
          >
        </button>
        <button
          id="navBtnThemeToggle"
          class="w-10 h-10 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-amber-500 flex items-center justify-center transition-colors shadow-sm cursor-pointer"
          aria-label="Cambiar tema"
        >
          <i class="fa-solid fa-moon text-sm"></i>
        </button>
      </div>
    </nav>

    <main
      class="max-w-5xl w-full mx-auto px-4 py-8 md:px-8 flex-grow space-y-6"
    >
      <section
        class="bg-[#3d2a21]/60 border border-[#543d32] rounded-[2rem] p-6 flex flex-col sm:flex-row items-center justify-between gap-6 shadow-xl"
      >
        <div
          class="flex flex-col sm:flex-row items-center gap-5 text-center sm:text-left"
        >
          <div
            class="w-20 h-20 rounded-full bg-[#4a352b] border-2 border-[#f5be38] flex items-center justify-center text-4xl shadow-inner select-none"
          >
            👨‍🍳
          </div>
          <div class="space-y-1.5">
            <div
              class="flex items-center justify-center sm:justify-start gap-3"
            >
              <h2
                id="cardNombre"
                class="text-2xl font-serif font-bold tracking-wide text-white uppercase"
              >
                EDU
              </h2>
              <span
                id="cardRol"
                class="bg-green-500/20 text-green-400 border border-green-500/30 text-[10px] uppercase font-bold tracking-wider px-2.5 py-0.5 rounded-md"
              >
                Cargando...
              </span>
            </div>
            <p id="cardEmail" class="text-xs text-stone-400 font-mono"></p>
          </div>
        </div>

        <button
          class="w-full sm:w-auto bg-[#e07a48] hover:bg-[#cf6937] text-white font-medium text-xs tracking-wide px-5 py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 cursor-pointer active:scale-95"
        >
          <i class="fa-regular fa-pen-to-square"></i> EDITAR PERFIL
        </button>
      </section>

      <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
        <section
          class="bg-[#3d2a21]/60 border border-[#543d32] rounded-[2rem] p-6 shadow-xl md:col-span-2 space-y-5"
        >
          <div
            class="flex items-center gap-2 border-b border-[#f5be38]/20 pb-2 mb-2"
          >
            <i class="fa-solid fa-address-card text-[#f5be38] text-sm"></i>
            <h3 class="text-white text-xs font-bold tracking-wider uppercase">
              Información Personal
            </h3>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Nombre Completo</span
            >
            <p id="infoNombre" class="text-sm font-medium text-stone-200">
              Cargando...
            </p>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Correo Electrónico</span
            >
            <p
              id="infoEmail"
              class="text-sm font-medium text-[#f5be38] font-mono break-all hover:underline cursor-pointer"
            >
              Cargando...
            </p>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Teléfono</span
            >
            <p
              id="infoTelefono"
              class="text-sm font-medium text-stone-200 font-mono"
            >
              Cargando...
            </p>
          </div>

          <div class="space-y-0.5">
            <span
              class="block text-[11px] font-semibold text-stone-500 uppercase tracking-wide"
              >Dirección</span
            >
            <p id="infoDireccion" class="text-sm font-medium text-stone-200">
              Cargando...
            </p>
          </div>
        </section>

        <section
          class="bg-[#3d2a21]/60 border border-[#543d32] rounded-[2rem] p-6 shadow-xl md:col-span-3 space-y-5"
        >
          <div
            class="flex items-center gap-2 border-b border-[#f5be38]/20 pb-2 mb-2"
          >
            <i class="fa-solid fa-chart-simple text-[#f5be38] text-sm"></i>
            <h3 class="text-white text-xs font-bold tracking-wider uppercase">
              Estadísticas
            </h3>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div
              class="bg-[#2a1a14]/60 border border-stone-800/80 rounded-2xl p-4 text-center flex flex-col justify-center items-center h-28"
            >
              <span
                id="statPedidos"
                class="block text-3xl font-mono font-black text-[#f5be38]"
              >
                0
              </span>
              <span
                class="block text-[10px] font-semibold text-stone-400 uppercase tracking-wider mt-1"
                >Pedidos</span
              >
            </div>

            <div
              class="bg-[#2a1a14]/60 border border-stone-800/80 rounded-2xl p-4 text-center flex flex-col justify-center items-center h-28 relative overflow-hidden"
            >
              <span
                class="absolute top-2.5 right-2.5 w-2 h-2 rounded-full bg-red-500 animate-pulse"
              ></span>
              <span
                id="statActivos"
                class="block text-3xl font-mono font-black text-white"
                >0</span
              >
              <span
                class="block text-[10px] font-semibold text-stone-400 uppercase tracking-wider mt-1"
                >Pedidos Activos</span
              >
            </div>

            <div
              class="bg-[#2a1a14]/60 border border-stone-800/80 rounded-2xl p-4 text-center flex flex-col justify-center items-center h-28"
            >
              <span
                id="statCalificacion"
                class="block text-3xl font-mono font-black text-green-400 flex items-center justify-center gap-1"
              >
                0.0 <span class="text-xs text-[#f5be38]">★</span>
              </span>
              <span
                class="block text-[10px] font-semibold text-stone-400 uppercase tracking-wider mt-1"
                >Calificación</span
              >
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (function () {
        // Manejo Automático de la Pestaña Activa en el Navbar basándose en el nombre de archivo
        const currentPath = window.location.pathname.split("/").pop();
        document.querySelectorAll(".nav-link").forEach((link) => {
          const href = link.getAttribute("href");
          const indicator = link.querySelector(".active-indicator");
          const icon = link.querySelector("i");

          if (
            currentPath === href ||
            (currentPath === "" && href === "perfil.html")
          ) {
            link.classList.remove("text-stone-600", "hover:text-[#cf6937]");
            link.classList.add("text-[#cf6937]");
            if (icon) {
              icon.classList.remove("text-stone-400");
              icon.classList.add("text-[#cf6937]");
            }
            if (indicator) {
              indicator.classList.remove("hidden");
            }
          }
        });

        document.addEventListener("DOMContentLoaded", async () => {
          const token = localStorage.getItem("token");

          // Si no hay token, lo pateamos de vuelta al login
          if (!token) {
            window.location.href = "login.html";
            return;
          }

          try {
            const response = await fetch(
              "http://localhost:8080/usuario/mi-perfil",
              {
                method: "GET",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json",
                },
              },
            );

            // Si el servidor rechaza la petición, capturamos el mensaje exacto
            if (!response.ok) {
              const errorBackend = await response.text();
              throw new Error(
                `Rechazo del servidor (Código ${response.status}): ${errorBackend}`,
              );
            }

            const usuario = await response.json();

            // 2. FUNCIÓN ANTI-ERRORES: Solo pone el texto si el ID realmente existe
            const inyectarTexto = (id, texto) => {
              const elemento = document.getElementById(id);
              if (elemento) {
                elemento.textContent = texto;
              } else {
                console.warn(`Aviso: Falta poner el id="${id}" en tu HTML.`);
              }
            };

            // 3. Calculamos el primer nombre de forma segura (por si acaso no tiene nombre registrado)
            let primerNombre = "USUARIO";
            if (usuario.nombreCompleto) {
              primerNombre = usuario.nombreCompleto.split(" ")[0].toUpperCase();
            }

            // Imprimimos los datos en consola por si queremos ver cómo los envía Java
            console.log("Datos completos que llegan del Backend:", usuario);

            // 1. Declaramos la variable AFUERA para que nunca salga "not defined"
            let rolBD = "";

            // 2. Buscamos el rol (Spring Boot a veces usa 'roles' y a veces 'authorities')
            if (usuario.roles && usuario.roles.length > 0) {
              rolBD =
                usuario.roles[0].nombre || usuario.roles[0].authority || "";
            } else if (usuario.authorities && usuario.authorities.length > 0) {
              rolBD = usuario.authorities[0].authority || "";
            }

            // 3. Hacemos la traducción amigable
            if (rolBD) {
              if (rolBD === "ROLE_USER" || rolBD === "USER") {
                nombreRol = "Cliente";
              } else if (rolBD === "ROLE_ADMIN" || rolBD === "ADMIN") {
                nombreRol = "Administrador";
              } else {
                nombreRol = rolBD.replace("ROLE_", "");
              }
            }

            // 4. Inyectamos los datos usando nuestra nueva función segura
            inyectarTexto("cardNombre", primerNombre);
            inyectarTexto("cardEmail", usuario.email);
            inyectarTexto("cardRol", nombreRol);
            inyectarTexto(
              "infoNombre",
              usuario.nombreCompleto || "No registrado",
            );
            inyectarTexto("infoEmail", usuario.email);
            inyectarTexto("infoTelefono", usuario.telefono || "No registrado");
            inyectarTexto(
              "infoDireccion",
              usuario.direccion || "No registrada",
            );
            inyectarTexto(
              "statPedidos",
              usuario.totalPedidos !== undefined ? usuario.totalPedidos : "0",
            );
            inyectarTexto(
              "statPedidosActivos",
              usuario.pedidosActivos !== undefined
                ? usuario.pedidosActivos
                : "0",
            );
            inyectarTexto(
              "statCalificacion",
              usuario.calificacion !== undefined ? usuario.calificacion : "0.0",
            );
          } catch (error) {
            // AQUÍ PAUSAMOS LA EXPULSIÓN Y MOSTRAMOS EL ERROR
            console.error("Error detallado:", error);
            alert(
              "ALERTA DE DEBUG: " +
                error.message +
                "\n\nPresiona F12 para ver la consola.",
            );

            // Comentamos la expulsión temporalmente
            // localStorage.clear();
            // window.location.href = "login.html";
          }
        });
        // Evento Salir
        document
          .getElementById("navBtnLogout")
          ?.addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "login.html";
          });
      })();
    </script>
  </body>
</html>
